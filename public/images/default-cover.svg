<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="Worship music default cover">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8f3fb"/>
      <stop offset="50%" stop-color="#efe3f9"/>
      <stop offset="100%" stop-color="#e6d4fb"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d9b25f"/>
      <stop offset="100%" stop-color="#b88a3a"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="64" fill="url(#bg)"/>

  <!-- Subtle glow rings -->
  <circle cx="256" cy="256" r="190" fill="none" stroke="#8b5fa8" stroke-opacity="0.15" stroke-width="10"/>
  <circle cx="256" cy="256" r="130" fill="none" stroke="#8b5fa8" stroke-opacity="0.12" stroke-width="8"/>

  <!-- Cross -->
  <path d="M256 120v272" stroke="url(#gold)" stroke-width="22" stroke-linecap="round"/>
  <path d="M156 220h200" stroke="url(#gold)" stroke-width="22" stroke-linecap="round"/>

  <!-- Music notes -->
  <path d="M336 156c36-8 66 18 58 44-9 28-44 30-58 6" fill="none" stroke="url(#gold)" stroke-width="10" stroke-linecap="round"/>
  <path d="M336 156v150c0 34-48 46-64 20-14-24 3-52 28-55" fill="none" stroke="url(#gold)" stroke-width="10" stroke-linecap="round"/>
  <circle cx="305" cy="294" r="10" fill="#8b5fa8" fill-opacity="0.35"/>

  <!-- Small stars -->
  <g fill="#8b5fa8" fill-opacity="0.28">
    <path d="M92 160l10 24 24 10-24 10-10 24-10-24-24-10 24-10z"/>
    <path d="M420 220l8 18 18 8-18 8-8 18-8-18-18-8 18-8z"/>
